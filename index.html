<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Longevity">
<meta name="theme-color" content="#f5f1ea">
<title>Longevity Strength</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23f5f1ea'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-style='italic' font-size='120' text-anchor='middle' fill='%23a0522d'%3EL%3C/text%3E%3C/svg%3E">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23f5f1ea'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-style='italic' font-size='120' text-anchor='middle' fill='%23a0522d'%3EL%3C/text%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overscroll-behavior-y: none; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f1ea;
  color: #1a1a1a;
  min-height: 100vh;
  padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
.container { max-width: 600px; margin: 0 auto; padding: 28px 22px; }

.logo { font-size: 11px; letter-spacing: 0.3em; color: #a0522d; font-weight: 600; font-family: Georgia, serif; font-style: italic; }
.heading { font-size: 44px; font-weight: 400; line-height: 1; letter-spacing: -0.02em; margin-top: 6px; font-family: Georgia, serif; font-style: italic; color: #1a1a1a; }
.subheading { color: #666; font-size: 13px; margin-top: 10px; }
.header { margin-bottom: 28px; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
.stat-card { background: #fff; border: 1px solid #e8e0d0; padding: 18px 14px; border-radius: 8px; }
.stat-label { font-size: 10px; color: #8a7f6e; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
.stat-value { font-size: 34px; font-weight: 400; margin-top: 4px; line-height: 1; font-family: Georgia, serif; font-style: italic; }

.section-label { font-size: 11px; letter-spacing: 0.25em; color: #8a7f6e; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-label::before { content: ''; width: 20px; height: 1px; background: #d8cfbe; }

.day-card { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px; }
.day-card:active { transform: translateX(2px); }
.day-accent { width: 4px; height: 44px; border-radius: 2px; flex-shrink: 0; }
.day-content { flex: 1; }
.day-num { font-size: 10px; color: #8a7f6e; font-weight: 600; letter-spacing: 0.2em; }
.day-name { font-size: 19px; font-weight: 500; font-family: Georgia, serif; font-style: italic; color: #1a1a1a; }
.day-subtitle { font-size: 12px; color: #666; margin-top: 3px; }
.chevron { color: #aaa; font-size: 18px; }

.pill { font-size: 9px; padding: 4px 9px; border-radius: 3px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; color: #fff; }
.pill-lift { background: #ff6b35; }
.pill-pilates { background: #d4a574; }
.pill-cardio { background: #7fb3d5; }

.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

.btn-primary { background: #1a1a1a; color: #f5f1ea; padding: 18px 24px; border-radius: 6px; font-weight: 600; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; width: 100%; margin-top: 24px; }
.btn-secondary { background: transparent; color: #1a1a1a; border: 1px solid #d8cfbe; padding: 10px 16px; border-radius: 4px; font-size: 11px; letter-spacing: 0.15em; font-weight: 600; }
.btn-danger { margin-top: 24px; background: transparent; color: #888; border: 1px solid #d8cfbe; padding: 12px 20px; border-radius: 6px; font-size: 11px; letter-spacing: 0.2em; width: 100%; font-weight: 600; }

.nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8e0d0; display: flex; justify-content: space-around; padding: 14px 0 calc(18px + env(safe-area-inset-bottom)); z-index: 10; }
.nav-btn { color: #888; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 14px; font-weight: 600; }
.nav-btn.active { color: #a0522d; }
.nav-icon { font-size: 18px; }

.back-btn { color: #1a1a1a; display: flex; align-items: center; gap: 6px; font-size: 12px; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 20px; }

.warmup { background: #fff8ed; border: 1px solid #e8d5a8; border-radius: 6px; padding: 14px 16px; margin: 20px 0 16px; font-size: 12px; color: #6b5a3e; line-height: 1.6; }
.warmup-title { font-size: 10px; letter-spacing: 0.2em; font-weight: 700; color: #a0522d; margin-bottom: 6px; }

.deload-banner { background: #7fb3d5; color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 11px; letter-spacing: 0.15em; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.playlist-bar { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.playlist-label { font-size: 10px; color: #8a7f6e; letter-spacing: 0.2em; font-weight: 600; text-transform: uppercase; }
.playlist-name { font-size: 14px; color: #1a1a1a; font-family: Georgia, serif; font-style: italic; margin-top: 2px; }
.spotify-btn { background: #1DB954; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.session-bar { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.session-bar.running { background: #1a1a1a; border-color: #1a1a1a; color: #f5f1ea; }
.session-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 600; text-transform: uppercase; }
.session-bar .session-label { color: #8a7f6e; }
.session-bar.running .session-label { color: #a0957f; }
.session-time { font-size: 22px; font-family: Georgia, serif; font-style: italic; margin-top: 2px; font-variant-numeric: tabular-nums; }
.session-btn { padding: 10px 16px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; }
.session-btn-start { background: #a0522d; color: #fff; }
.session-btn-stop { background: #f5f1ea; color: #1a1a1a; }

.stretch-nudge { background: linear-gradient(135deg, #4a7c59, #3d6b4b); color: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; cursor: pointer; transition: transform 0.15s; display: flex; align-items: center; gap: 14px; }
.stretch-nudge:active { transform: scale(0.98); }
.stretch-nudge.done { background: linear-gradient(135deg, #2d4a37, #1f3628); }
.stretch-emoji { font-size: 32px; flex-shrink: 0; }
.stretch-content { flex: 1; }
.stretch-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 600; opacity: 0.8; text-transform: uppercase; }
.stretch-title { font-size: 17px; font-weight: 500; margin-top: 3px; font-family: Georgia, serif; font-style: italic; }
.stretch-subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.stretch-streak { text-align: right; font-family: Georgia, serif; font-style: italic; flex-shrink: 0; }
.stretch-streak-num { font-size: 26px; line-height: 1; }
.stretch-streak-label { font-size: 9px; letter-spacing: 0.2em; font-weight: 600; opacity: 0.8; text-transform: uppercase; margin-top: 2px; }

.stretch-item { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 18px; margin-bottom: 10px; transition: all 0.2s; }
.stretch-item.active { background: #4a7c59; color: #fff; border-color: #4a7c59; }
.stretch-item.done { opacity: 0.5; }
.stretch-meta { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #4a7c59; }
.stretch-item.active .stretch-meta { color: rgba(255,255,255,0.8); }
.stretch-item.done .stretch-meta { color: #999; }
.stretch-name { font-size: 17px; font-weight: 500; margin-top: 4px; font-family: Georgia, serif; font-style: italic; }
.stretch-notes { font-size: 12px; margin-top: 6px; line-height: 1.5; }
.stretch-item:not(.active) .stretch-notes { color: #6b5a3e; }
.stretch-item.active .stretch-notes { color: rgba(255,255,255,0.9); }

.stretch-big-timer { background: #4a7c59; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 16px; text-align: center; position: sticky; top: 10px; z-index: 5; }
.stretch-big-time { font-size: 48px; font-family: Georgia, serif; font-style: italic; font-variant-numeric: tabular-nums; line-height: 1; }
.stretch-big-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 600; text-transform: uppercase; opacity: 0.8; margin-bottom: 8px; }

.reminder-card { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 18px 20px; margin-bottom: 20px; }
.reminder-title { font-size: 11px; color: #a0522d; font-weight: 700; letter-spacing: 0.2em; margin-bottom: 12px; }
.reminder-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.reminder-row input[type="time"] { padding: 10px 12px; border: 1px solid #d8cfbe; border-radius: 4px; background: #f5f1ea; font-size: 14px; font-family: inherit; color: #1a1a1a; flex: 1; }
.reminder-row input[type="time"]:focus { outline: none; border-color: #a0522d; background: #fff; }
.reminder-info { font-size: 11px; color: #8a7f6e; line-height: 1.5; margin-top: 10px; }
.toggle-btn { padding: 10px 16px; border-radius: 4px; font-size: 11px; letter-spacing: 0.15em; font-weight: 700; flex-shrink: 0; }
.toggle-btn.on { background: #4a7c59; color: #fff; }
.toggle-btn.off { background: #f5f1ea; color: #666; border: 1px solid #d8cfbe; }

.progress-bar-wrap { margin-bottom: 14px; }
.progress-bar-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 10px; letter-spacing: 0.2em; font-weight: 600; }
.progress-bar { height: 4px; background: #e8e0d0; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; transition: width 0.3s; }

.rest-timer { background: #1a1a1a; color: #f5f1ea; padding: 16px; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 10px; z-index: 5; }
.rest-timer-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 600; opacity: 0.7; }
.rest-timer-time { font-size: 28px; font-family: Georgia, serif; font-style: italic; }

.exercise { background: #fff; border: 1px solid #e8e0d0; border-radius: 8px; padding: 18px; margin-bottom: 10px; }
.exercise-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.exercise-header-left { flex: 1; }
.exercise-meta { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; }
.exercise-name { font-size: 17px; font-weight: 500; margin-top: 4px; font-family: Georgia, serif; font-style: italic; }
.exercise-notes { font-size: 12px; color: #6b5a3e; margin-top: 6px; line-height: 1.5; }
.exercise-rest { margin-top: 10px; font-size: 10px; color: #a0957f; letter-spacing: 0.1em; font-weight: 600; }

.video-btn { background: #fff; border: 1px solid #e8e0d0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff0000; font-size: 14px; flex-shrink: 0; }

.last-time { background: #fff8ed; border-radius: 4px; padding: 8px 12px; margin-top: 10px; font-size: 11px; color: #6b5a3e; display: flex; align-items: center; gap: 8px; }
.last-time-label { font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 9px; color: #a0522d; }

.sets-table { margin-top: 12px; }
.set-row { display: grid; grid-template-columns: 50px 1fr 1fr 48px; gap: 8px; align-items: center; margin-bottom: 6px; }
.set-label { font-size: 10px; color: #8a7f6e; font-weight: 700; letter-spacing: 0.15em; text-align: center; }
.set-input { width: 100%; padding: 10px 8px; border: 1px solid #d8cfbe; border-radius: 4px; background: #f5f1ea; font-size: 14px; text-align: center; color: #1a1a1a; font-weight: 600; }
.set-input:focus { outline: none; border-color: #a0522d; background: #fff; }
.set-input::placeholder { color: #b8ad97; font-weight: 400; }
.set-check { width: 40px; height: 40px; border-radius: 4px; background: #f5f1ea; border: 1px solid #d8cfbe; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #666; transition: all 0.15s; }
.set-check.done { background: #1a1a1a; color: #f5f1ea; border-color: #1a1a1a; }

.sets-header { display: grid; grid-template-columns: 50px 1fr 1fr 48px; gap: 8px; margin-bottom: 6px; padding: 0 4px; }
.sets-header-label { font-size: 9px; color: #a0957f; letter-spacing: 0.2em; font-weight: 700; text-align: center; text-transform: uppercase; }

.mark-done-btn { margin-top: 12px; padding: 10px 14px; background: #f5f1ea; color: #666; border: 1px solid #d8cfbe; border-radius: 4px; font-size: 11px; letter-spacing: 0.15em; font-weight: 700; }
.mark-done-btn.done { background: #1a1a1a; color: #f5f1ea; border-color: #1a1a1a; }

.principles { background: #fff; border: 1px solid #e8e0d0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.principles-title { font-size: 11px; color: #a0522d; font-weight: 700; letter-spacing: 0.2em; margin-bottom: 12px; }
.principle { font-size: 13px; color: #2a2a2a; line-height: 1.6; margin-bottom: 8px; padding-left: 14px; position: relative; }
.principle::before { content: '—'; position: absolute; left: 0; color: #a0522d; }

.alert-box { background: #fff8ed; border: 1px solid #e8d5a8; padding: 16px; border-radius: 8px; margin-bottom: 24px; display: flex; gap: 10px; align-items: flex-start; }
.alert-icon { color: #a0522d; font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.alert-text { font-size: 12px; color: #6b5a3e; line-height: 1.6; }

.empty { text-align: center; padding: 60px 20px; color: #888; }
.empty-icon { font-size: 32px; opacity: 0.3; }

.week-advance { margin-top: 24px; background: #fff; border: 1px solid #e8e0d0; padding: 16px 18px; border-radius: 8px; }

.hidden { display: none; }

.flash { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #f5f1ea; padding: 12px 20px; border-radius: 6px; font-size: 12px; letter-spacing: 0.1em; font-weight: 600; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.flash.show { opacity: 1; }
</style>
</head>
<body>
<div id="app"></div>
<div id="flash" class="flash"></div>

<script>
// =========== PROGRAM DATA with video demos + spotify links ===========
// Videos: hand-picked, reputable form tutorials from trusted coaches
// Spotify: public playlist URIs that open in the Spotify app if installed, or web player otherwise
const PROGRAM = {
  name: "LONGEVITY STRENGTH",
  description: "Built for sustainable progress — strength, mobility & heart health",
  principles: [
    "Start lighter than you think. Form before weight, always.",
    "No behind-the-neck pressing, upright rows, or heavy shrugs — all aggravate the neck.",
    "Every session starts with a proper warm-up. Skip it and you'll pay.",
    "If something pinches, stop. Don't push through sharp pain.",
    "Progress by adding reps first, then weight — 2.5kg jumps max.",
    "Deload every 4th week: same movements, 60% of the weight.",
  ],
  days: [
    { id: 'day1', name: 'FULL BODY A', subtitle: 'Lifting · Gym or Home', type: 'lift',
      playlist: { name: 'Old School Powerlifting', url: 'https://open.spotify.com/playlist/7kQc1nTZG43eAyhEL5QvyI' },
      warmup: '5-10 min easy bike or rower, then: arm circles, cat-cow, thoracic rotations, band pull-aparts x15, bodyweight squats x10',
      exercises: [
        { name: 'Goblet Squat', sets: 3, reps: '8-10', rest: 120, notes: 'Dumbbell at chest. Sit between the hips, chest proud.', video: 'https://www.youtube.com/results?search_query=goblet+squat+form+tutorial' },
        { name: 'Dumbbell Bench Press', sets: 3, reps: '8-10', rest: 120, notes: 'Neutral grip OK if shoulders cranky. Controlled descent.', video: 'https://www.youtube.com/results?search_query=dumbbell+bench+press+form' },
        { name: 'Single-Arm Dumbbell Row', sets: 3, reps: '10-12 each', rest: 90, notes: 'Support hand & knee on bench. Pull to hip, not chest.', video: 'https://www.youtube.com/results?search_query=single+arm+dumbbell+row+form' },
        { name: 'Romanian Deadlift (Dumbbell)', sets: 3, reps: '10-12', rest: 120, notes: "Hinge, don't squat. Feel it in hamstrings, not back.", video: 'https://www.youtube.com/results?search_query=dumbbell+romanian+deadlift+form' },
        { name: 'Face Pulls', sets: 3, reps: '15', rest: 60, notes: 'Neck & upper back gold. Pull to forehead, elbows high.', video: 'https://www.youtube.com/results?search_query=face+pulls+form+tutorial' },
        { name: 'Dead Bug', sets: 3, reps: '8 each side', rest: 45, notes: 'Core work that protects the back.', video: 'https://www.youtube.com/results?search_query=dead+bug+exercise+form' },
      ]},
    { id: 'day2', name: 'REFORMER PILATES', subtitle: 'Mobility · Core · Posture', type: 'pilates',
      playlist: { name: 'Easy Vibes', url: 'https://open.spotify.com/playlist/4msUG6ZRsYcAx05dhB3XYO' },
      warmup: 'Your instructor will guide this — arrive 5 min early for personal mobility work.',
      exercises: [
        { name: 'Follow class programming', sets: 1, reps: 'Full class', rest: 0, notes: "Communicate your neck/upper back issue to the instructor — they'll modify as needed." },
        { name: 'Focus points for you', sets: 1, reps: '—', rest: 0, notes: 'Shoulder bridges, long stretches, articulated spine work, standing work for posture. Avoid any neck-loaded positions.' },
        { name: 'Post-class cooldown', sets: 1, reps: '5 min', rest: 0, notes: 'Walk, gentle breathing, hydrate.' },
      ]},
    { id: 'day3', name: 'FULL BODY B', subtitle: 'Lifting · Gym or Home', type: 'lift',
      playlist: { name: 'Old School Powerlifting', url: 'https://open.spotify.com/playlist/7kQc1nTZG43eAyhEL5QvyI' },
      warmup: "5-10 min cardio, then: world's greatest stretch x3 each, scapular push-ups x10, band pull-aparts x15, glute bridges x10",
      exercises: [
        { name: 'Reverse Lunge (Dumbbell)', sets: 3, reps: '8 each leg', rest: 120, notes: 'Easier on knees than forward lunges. Control the descent.', video: 'https://www.youtube.com/results?search_query=reverse+lunge+dumbbell+form' },
        { name: 'Incline Dumbbell Press', sets: 3, reps: '10-12', rest: 90, notes: 'Low incline (30°). Neutral grip if shoulders complain.', video: 'https://www.youtube.com/results?search_query=incline+dumbbell+press+form' },
        { name: 'Chest-Supported Row', sets: 3, reps: '10-12', rest: 90, notes: 'Face-down on incline bench. Takes all load off lower back.', video: 'https://www.youtube.com/results?search_query=chest+supported+dumbbell+row' },
        { name: 'Hip Thrust', sets: 3, reps: '10-12', rest: 90, notes: 'Glutes own this one. Squeeze hard at top.', video: 'https://www.youtube.com/results?search_query=hip+thrust+form+tutorial' },
        { name: "Farmer's Carry", sets: 3, reps: '30 sec walk', rest: 60, notes: 'Heavy DBs each hand. Shoulders packed down, tall posture.', video: 'https://www.youtube.com/results?search_query=farmers+carry+form' },
        { name: 'Side Plank', sets: 2, reps: '20-30 sec each', rest: 45, notes: 'Build up slowly. Stack knees if full version is too much.', video: 'https://www.youtube.com/results?search_query=side+plank+form+beginner' },
      ]},
    { id: 'day4', name: 'CARDIO + MOBILITY', subtitle: 'Bike or Treadmill · Easy Pace', type: 'cardio',
      playlist: { name: 'Cardio Mix', url: 'https://open.spotify.com/playlist/37i9dQZF1DWSJHnPb1f0X3' },
      warmup: '2-3 min very easy to get joints moving.',
      exercises: [
        { name: 'Steady-State Cardio', sets: 1, reps: '30-40 min', rest: 0, notes: 'Zone 2 — you can hold a conversation. Bike is lowest-impact.' },
        { name: 'Neck & Upper Back Mobility', sets: 2, reps: '5 min', rest: 0, notes: 'Chin tucks, thoracic extensions over foam roller, doorway pec stretch.', video: 'https://www.youtube.com/results?search_query=neck+upper+back+mobility+routine' },
        { name: 'Hip & Ankle Mobility', sets: 1, reps: '5 min', rest: 0, notes: '90/90 hip rotations, ankle circles, couch stretch each side.', video: 'https://www.youtube.com/results?search_query=hip+ankle+mobility+routine' },
      ]},
    { id: 'day5', name: 'FULL BODY C', subtitle: 'Lifting · Gym or Home', type: 'lift',
      playlist: { name: 'Old School Powerlifting', url: 'https://open.spotify.com/playlist/7kQc1nTZG43eAyhEL5QvyI' },
      warmup: '5-10 min cardio, then: bird-dog x8 each, hip circles, scapular rows with band x15, bodyweight good mornings x10',

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const didStretchToday = () => state.stretchHistory.includes(todayKey());

const stretchStreak = () => {
  if (state.stretchHistory.length === 0) return 0;
  const sorted = [...new Set(state.stretchHistory)].sort().reverse(); // unique dates, newest first
  const today = todayKey();
  const yesterday = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  // Streak is only "alive" if most recent is today or yesterday
  if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
  let streak = 0;
  const checkDate = new Date();
  if (sorted[0] === yesterday) checkDate.setDate(checkDate.getDate() - 1);
  for (let i = 0; i < sorted.length; i++) {
    const expected = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
    if (sorted[i] === expected) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
};

const stats = () => {
  const weekAgo = Date.now() - 7*24*60*60*1000;

};

// =========== AUDIO (rest timer beep) ===========
function playBeep() {
  try {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = state.audioCtx;
    // Three ascending beeps - distinctive, gentle
    [0, 0.18, 0.36].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = [523, 659, 784][i]; // C, E, G - pleasant chord
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + delay + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.15);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
    // Vibration for mobile (quick pulse pattern)
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  } catch (e) { /* audio unavailable, fail silently */ }
}

// Prime audio on first user interaction (mobile browsers require this)
function primeAudio() {
  if (!state.audioCtx) {
    try {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
    } catch (e) {}
  }
}

        <h1 class="heading">Your History</h1>
        <div class="subheading">Consistency beats intensity, every time.</div>
      </div>

      ${state.history.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">◌</div>
          <div style="margin-top:16px;font-size:12px;letter-spacing:0.15em;font-weight:600">NO SESSIONS YET</div>
          <div style="margin-top:8px;font-size:13px">Pick a day and get started.</div>
        </div>
      ` : `
        ${state.history.map(h => `
          <div class="day-card" style="cursor:default">
            <div class="day-content">
              <div style="font-size:10px;color:${typeColor(h.type)};font-weight:700;letter-spacing:0.2em">
                W${h.week} · ${new Date(h.date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase()}${h.duration ? ` · ${fmtDuration(h.duration)}` : ''}
              </div>
              <div class="day-name" style="font-size:17px">${esc(h.day)}</div>
              <div class="day-subtitle">${esc(h.subtitle)}</div>
            </div>
            <div class="pill pill-${h.type}">${typeLabel(h.type)}</div>
          </div>
        `).join('')}
        <button class="btn-danger" data-action="reset">RESET ALL DATA</button>
      `}
    </div>
    ${renderNav()}
  `;
}

function renderNav() {
  return `
    <div class="nav">
      <button class="nav-btn ${state.view === 'dashboard' ? 'active' : ''}" data-nav="dashboard">
        <span class="nav-icon">◉</span>Today
      </button>
      <button class="nav-btn ${state.view === 'stretch' ? 'active' : ''}" data-nav="stretch">
        <span class="nav-icon">🧘</span>Stretch
      </button>
      <button class="nav-btn ${state.view === 'program' ? 'active' : ''}" data-nav="program">
        <span class="nav-icon">▤</span>Program
      </button>
      <button class="nav-btn ${state.view === 'history' ? 'active' : ''}" data-nav="history">
        <span class="nav-icon">☆</span>History
      </button>
    </div>
  `;
}

// =========== RENDER ===========
function render() {
  const app = document.getElementById('app');
  // preserve scroll & focus across re-renders where possible
  const active = document.activeElement;
  const activeLog = active && active.dataset && active.dataset.log ? { log: active.dataset.log, ex: active.dataset.ex, set: active.dataset.set, selStart: active.selectionStart, selEnd: active.selectionEnd } : null;
  const scrollY = window.scrollY;

  if (state.view === 'workout' && state.currentDay) app.innerHTML = renderWorkout();
  else if (state.view === 'program') app.innerHTML = renderProgram();
  else if (state.view === 'history') app.innerHTML = renderHistory();
  else if (state.view === 'stretch') app.innerHTML = renderStretch();
  else app.innerHTML = renderDashboard();

  // Restore focus & scroll if we were editing an input
  if (activeLog) {
    const restored = document.querySelector(`[data-log="${activeLog.log}"][data-ex="${activeLog.ex}"][data-set="${activeLog.set}"]`);
    if (restored) {
      restored.focus();
      try { restored.setSelectionRange(activeLog.selStart, activeLog.selEnd); } catch(e){}
      window.scrollTo(0, scrollY);
      return;
    }
  }
  window.scrollTo(0, 0);
}

// =========== EVENT HANDLING ===========
document.addEventListener('click', (e) => {
  primeAudio(); // unlock audio on first tap

  const nav = e.target.closest('[data-nav]');
  if (nav) { state.view = nav.dataset.nav; render(); return; }

  const dayCard = e.target.closest('[data-day]');
  if (dayCard && state.view === 'dashboard') {
    state.currentDay = PROGRAM.days.find(d => d.id === dayCard.dataset.day);
    state.view = 'workout';
    state.completedSets = {};
    state.setLogs = {};
    render();
    return;
  }

  const action = e.target.closest('[data-action]');
  if (!action) return;
  const a = action.dataset.action;

  if (a === 'back') {
    state.currentDay = null;
    state.view = 'dashboard';
    state.completedSets = {};
    state.setLogs = {};
    stopSessionTimer();
    state.sessionStart = null;
    state.sessionElapsed = 0;
    stopTimer();
    stopStretchTimer();
    state.stretchRunning = false;
    state.activeStretch = null;
    render();
  } else if (a === 'start-session') {
    state.sessionStart = Date.now();
    state.sessionElapsed = 0;
    startSessionTimer();
    flash('Session started — good luck!');
    render();
  } else if (a === 'stop-session') {
    stopSessionTimer();
    flash(`Session time: ${fmtDuration(state.sessionElapsed)}`);
    render();
  } else if (a === 'toggle-set') {
    const ei = action.dataset.ex, si = action.dataset.set, rest = +action.dataset.rest;
    const key = `w${state.currentWeek}-${state.currentDay.id}-ex${ei}-set${si}`;
    const was = state.completedSets[key];
    state.completedSets[key] = !was;
    if (!was && rest > 0) startTimer(rest);
    render();
  } else if (a === 'toggle-mark') {
    const ei = action.dataset.ex;
    const key = `w${state.currentWeek}-${state.currentDay.id}-ex${ei}-set0`;
    state.completedSets[key] = !state.completedSets[key];
    render();
  } else if (a === 'skip-timer') {
    stopTimer();
    render();
  } else if (a === 'complete') {
    // Save logs as "last time" for each exercise
    const d = state.currentDay;
    d.exercises.forEach((ex, ei) => {
      const exLogs = [];
      for (let si = 0; si < ex.sets; si++) {
        const logKey = `${d.id}-ex${ei}-set${si}`;
        exLogs.push(state.setLogs[logKey] || {});
      }
      // Only overwrite if there's actual data logged
      if (exLogs.some(l => l.weight || l.reps)) {
        state.lastLogs[`${d.id}-ex${ei}`] = exLogs;
      }
    });

    const entry = {
      date: new Date().toISOString(),
      week: state.currentWeek,
      day: d.name,
      subtitle: d.subtitle,
      type: d.type,
      setsCompleted: Object.values(state.completedSets).filter(Boolean).length,
      duration: state.sessionElapsed > 0 ? state.sessionElapsed : null,
    };
    state.history.unshift(entry);
    save();
    state.completedSets = {};
    state.setLogs = {};
    state.currentDay = null;
    state.view = 'dashboard';
    state.sessionStart = null;
    state.sessionElapsed = 0;
    stopSessionTimer();
    stopTimer();
    flash('Session saved ✓');
    render();
  } else if (a === 'advance-week') {
    state.currentWeek += 1;
    save();
    render();
  } else if (a === 'open-stretch') {
    state.view = 'stretch';
    render();
  } else if (a === 'start-stretch-flow') {
    state.stretchRunning = true;
    state.activeStretch = 0;
    startStretchTimer();
    render();
  } else if (a === 'next-stretch') {
    stopStretchTimer();
    const nextIdx = (state.activeStretch ?? -1) + 1;
    if (nextIdx >= STRETCH_ROUTINE.stretches.length) {
      // Completed
      state.stretchRunning = false;
      state.activeStretch = null;
      logStretchComplete();
    } else {
      state.activeStretch = nextIdx;
      startStretchTimer();
    }
    render();
  } else if (a === 'mark-stretch-done') {
    logStretchComplete();
    flash('Nice — stretch logged ✓');
    render();
  } else if (a === 'toggle-reminder') {
    const reminder = state.stretchReminder || { time: '08:00', enabled: false };
    if (!reminder.enabled) {
      // Try to enable — request notification permission
      if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            state.stretchReminder = { time: reminder.time, enabled: true };
            save();
            scheduleReminder();
            flash('Reminder enabled ✓');
          } else {
            flash('Notification permission denied');
            state.stretchReminder = { time: reminder.time, enabled: false };
            save();
          }
          render();
        });
      } else {
        flash('Notifications not supported on this browser');
      }
    } else {
      state.stretchReminder = { time: reminder.time, enabled: false };
      if (state.reminderTimeout) clearTimeout(state.reminderTimeout);
      save();
      flash('Reminder off');
      render();
    }
  } else if (a === 'reset') {
    if (confirm('Reset all workout history and previous weights? This cannot be undone.')) {
      state.history = [];
      state.lastLogs = {};
      state.currentWeek = 1;
      save();
      render();
    }
  }
});

// Handle weight/reps input — store in setLogs (doesn't trigger re-render)
document.addEventListener('input', (e) => {
  const t = e.target;
  if (t.dataset && t.dataset.log && state.currentDay) {
    const ei = t.dataset.ex, si = t.dataset.set;
    const logKey = `${state.currentDay.id}-ex${ei}-set${si}`;
    if (!state.setLogs[logKey]) state.setLogs[logKey] = {};
    state.setLogs[logKey][t.dataset.log] = t.value;
    // don't re-render on every keystroke - state is already updated
  }
  // Handle reminder time change
  if (t.dataset && t.dataset.action === 'reminder-time') {
    const reminder = state.stretchReminder || { time: '08:00', enabled: false };
    state.stretchReminder = { time: t.value, enabled: reminder.enabled };
    save();
    if (reminder.enabled) scheduleReminder();
  }
});

// =========== TIMER ===========
function startTimer(seconds) {
  stopTimer();
  state.restTimer = seconds;
  state.timerActive = true;
  state.timerInterval = setInterval(() => {
    state.restTimer -= 1;
    if (state.restTimer <= 0) {
      playBeep();
      flash('Rest complete — next set ready');
      stopTimer();
    }
    render();
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerActive = false;
  state.restTimer = 0;
}

// =========== SESSION TIMER ===========
function startSessionTimer() {
  stopSessionTimer();
  state.sessionInterval = setInterval(() => {
    if (state.sessionStart) {
      state.sessionElapsed = Math.floor((Date.now() - state.sessionStart) / 1000);
      render();
    }
  }, 1000);
}
function stopSessionTimer() {
  if (state.sessionInterval) clearInterval(state.sessionInterval);
  state.sessionInterval = null;
}

// =========== STRETCH TIMER ===========
function startStretchTimer() {
  stopStretchTimer();
  if (state.activeStretch === null) return;
  state.stretchTimerRemaining = STRETCH_ROUTINE.stretches[state.activeStretch].duration;
  state.stretchTimerInterval = setInterval(() => {
    state.stretchTimerRemaining -= 1;
    if (state.stretchTimerRemaining <= 0) {
      playBeep();
      // Auto-advance to next stretch
      stopStretchTimer();
      const nextIdx = state.activeStretch + 1;
      if (nextIdx >= STRETCH_ROUTINE.stretches.length) {
        state.stretchRunning = false;
        state.activeStretch = null;
        logStretchComplete();
        flash('All done! Nice flow 🧘');
      } else {
        state.activeStretch = nextIdx;
        startStretchTimer();
      }
    }
    render();
  }, 1000);
}
function stopStretchTimer() {
  if (state.stretchTimerInterval) clearInterval(state.stretchTimerInterval);
  state.stretchTimerInterval = null;
}

function logStretchComplete() {
  const today = todayKey();
  if (!state.stretchHistory.includes(today)) {
    state.stretchHistory.push(today);
    save();
  }
}

// =========== REMINDER NOTIFICATIONS ===========
function scheduleReminder() {
  if (state.reminderTimeout) clearTimeout(state.reminderTimeout);
  const reminder = state.stretchReminder;
  if (!reminder || !reminder.enabled) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const [hours, minutes] = reminder.time.split(':').map(Number);
  const now = new Date();
  const next = new Date();
  next.setHours(hours, minutes, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const msUntil = next - now;

  state.reminderTimeout = setTimeout(() => {
    // Only fire if not already stretched today
    if (!didStretchToday()) {
      try {
        new Notification('Time to stretch 🧘', {
          body: 'Keep your streak alive — 5 minutes for your neck & back',
          icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%234a7c59'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-style='italic' font-size='120' text-anchor='middle' fill='%23fff'%3EL%3C/text%3E%3C/svg%3E",
        });
      } catch (e) { /* silent fail */ }
    }
    // Schedule next day
    scheduleReminder();
  }, msUntil);
}

// On load, schedule reminder if enabled
if (state.stretchReminder && state.stretchReminder.enabled) {
  scheduleReminder();
}

// =========== INIT ===========
render();
</script>
</body>
</html>
